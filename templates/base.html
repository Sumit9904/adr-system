<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}ADR System{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background: linear-gradient(180deg, #0d6efd, #0a58ca);
            color: white;
            position: fixed;
            width: 240px;
            padding-top: 20px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a.active,
        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
        }

        .content {
            margin-left: 240px;
            padding: 30px;
        }

        .topbar {
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center">ADR System</h4>
    <hr>

    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/" class="{% if request.path == '/' %}active{% endif %}">
        <i class="bi bi-table"></i> ADR Records
    </a>

    <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
        <i class="bi bi-bar-chart"></i> Analytics
    </a>

    <a href="/export">
        <i class="bi bi-file-earmark-excel"></i> Export
    </a>

    <a href="/logout">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>
</div>

<div class="content">

    <div class="topbar d-flex justify-content-between align-items-center">
        <h5 class="mb-0">{% block page_title %}{% endblock %}</h5>
        <span class="text-muted">Welcome, {{ session.get("user") }}</span>
    </div>

    {% block content %}{% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
